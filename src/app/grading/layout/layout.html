<div class="h-dvh overflow-hidden bg-linear-to-br from-gray-400 via-gray-100 to-gray-50 p-5">
    <div class="grid grid-cols-1 lg:grid-cols-6 gap-5 h-full">
        <div class="lg:col-span-4 h-full overflow-y-auto no-scrollbar">
            <div class="mb-4 shrink-0 flex items-center justify-between">
                <div class="flex items-center gap-2 bg-white/10 p-3 rounded-2xl backdrop-blur-3xl w-max">
                    <div class="w-8 h-8 bg-zinc-900 rounded-lg flex items-center justify-center">

                            <path d="M6 12v5c3 3 9 3 12 0v-5"></path>
                        </svg>
                    </div>
                    <span class="font-bold text-lg tracking-tight uppercase text-zinc-900">
                        Dces

                </div>
                <div class="flex gap-2 items-center">
                    <div class="w-9 h-9 flex items-center justify-center rounded-full bg-white/40 backdrop-blur-3xl hover:bg-white/50 transition cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" color="#4a4a4a" fill="none" stroke="#4a4a4a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                    </div>
                    <div class="w-9 h-9 flex items-center justify-center rounded-full bg-white/40 backdrop-blur-3xl hover:bg-white/50 transition cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" color="#4a4a4a" fill="none" stroke="#141B34" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

                            <path d="M12 3L12 7" />
                        </svg>
                    </div>
                    <button (click)="startGrading($event)" class="btn fill">Start Grading</button>
                </div>
            </div>

            <div class="flex-1">
                <router-outlet></router-outlet>
            </div>
        </div>
        <div class="lg:col-span-2 h-full min-h-0 overflow-hidden flex flex-col">
            <div class="h-full min-h-0">
                <app-user class="h-full flex flex-col gap-5 "></app-user>
            </div>
        </div>
    </div>
</div>
