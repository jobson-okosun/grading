        <div class="text-gray-600 font-bold mb-5 ">Evaluation summary | {{  2 }} </div>

                <ng-template #header>
                    <tr class="thr">
                        <th>Date</th>
                        <th>Booklet</th>
                        <th>Completed</th>
                        <th>Pending</th>
                        <th>Skipped</th>
                    </tr>
                </ng-template>
                <ng-template #body let-item let-i="rowIndex">
                    <tr class="tbr">
                        <td> 12/13/2026 </td>
                        <td> 5 </td>
                        <td> 1 </td>
                        <td> 2</td>
                        <td> 3 </td>
                    </tr>
                </ng-template>
