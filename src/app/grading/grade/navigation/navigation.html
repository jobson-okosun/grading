<div class="rounded-2xl p-1 border border-gray-200 flex gap-2">
    <button (click)="previousQuestion()" [disabled]="store().currentQuestionIndex == 0" class="px-4 py-2 font-semibold text-white bg-gray-700 hover:bg-gray-600 rounded-lg text-center cursor-pointer transition">
        Prev    
    </button>
    <button class="px-4 py-2 font-semibold text-gray-700 bg-white rounded-lg text-center border border-gray-200">
        {{ store().currentQuestionIndex + 1 }}
    </button>
    <button (click)="nextQuestion()" [disabled]="(store().currentQuestionIndex == store().questions.length - 1) || !currentQuestionPagesNavigationResolved()" class="px-4 py-2 font-semibold text-white bg-gray-700 hover:bg-gray-600 rounded-lg text-center cursor-pointer transition">
        Next
    </button>
</div>

<ng-template #ungradedSections let-toastRef>
    <div>
        <div class="flex justify-between items-center gap-3 mb-2">
            <div class="font-bold text-lg text-primary">Sections ungraded</div>
            <button (click)="toastRef.close({ dismissedByAction: true })">
                <i class="pi pi-times"></i>
            </button>
        </div>
        <p class="text-sm mb-2">The following sections are ungraded:</p>
        <div class="p-3 rounded-md bg-gray-100 flex gap-2 flex-wrap w-xs">
            @for(section of toastRef?.data?.sectionsNotGraded; track $index) {
                <span class="text-gray-700 px-4 py-2 font-semibold rounded-md bg-white mb-1">{{ section.name }}</span>
            }
        </div>
    </div>
</ng-template>

<ng-template #questionPagesUngraded let-toastRef>
    <div>
        <div class="flex justify-between items-center gap-3 mb-2">
            <div class="font-bold text-lg text-primary">Pages ungraded</div>
            <button (click)="toastRef.close({ dismissedByAction: true })">
                <i class="pi pi-times"></i>
            </button>
        </div>
        <p class="text-sm mb-2">The following pages are ungraded:</p>
        <div class="p-3 rounded-md bg-gray-100 flex gap-2 flex-wrap w-xs">
            @for(page of toastRef?.data?.questionPagesUngraded; track $index) {
                <span class="text-gray-700 px-4 py-2 font-semibold rounded-md bg-white mb-1">{{ page.page + 1 }}</span>
            }
        </div>
    </div>
</ng-template>
