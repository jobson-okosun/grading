<div id="container" class="w-full h-full relative">
    <div id="stage-parent" [style.overflow]="'auto'">
        <div id="stage"></div>

        @if(!hasResponse()) {
            <div class="w-full h-full flex flex-col items-center justify-center absolute inset-0 bg-transparent">
                <div class="w-30 h-30 bg-gray-50 rounded-full flex items-center justify-center mb-5">
                    <svg class="stroke-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="60" height="60" color="#4a4a4a" fill="none" stroke="#4a4a4a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22C11.1818 22 10.4002 21.6646 8.83693 20.9939C4.94564 19.3243 3 18.4895 3 17.0853L3 7.7475M12 22C12.8182 22 13.5998 21.6646 15.1631 20.9939C19.0544 19.3243 21 18.4895 21 17.0853V7.7475M12 22L12 12.1707M21 7.7475C21 8.35125 20.1984 8.7325 18.5953 9.495L15.6741 10.8844C13.8712 11.7419 12.9697 12.1707 12 12.1707M21 7.7475C21 7.14376 20.1984 6.7625 18.5953 6M3 7.7475C3 8.35125 3.80157 8.7325 5.40472 9.495L8.32592 10.8844C10.1288 11.7419 11.0303 12.1707 12 12.1707M3 7.7475C3 7.14376 3.80157 6.7625 5.40472 6M6.33203 13.311L8.32591 14.2594" />
                        <path d="M12 2V4M16 3L14.5 5M8 3L9.5 5" />
                    </svg>
                </div>
                <p class="text-gray-500">No response found</p>
            </div>
        }

        @if(currentPageIsBlank()) {
            <div class="absolute inset-0 m-2 pointer-events-none  bg-[linear-gradient(to_top_left,transparent_49.8%,red_50%,transparent_50.2%)]"></div>
        }
    </div>
</div>
